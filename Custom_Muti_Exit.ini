[custom]
;设置规则标志位
;以下规则，按照从上往下的顺序遍历，优先命中上位规则，规则重复无影响
;修改顺序会影响分流效果

;本地地址和域名直连
ruleset=🎯 全球直连,[]GEOSITE,private
ruleset=🎯 全球直连,[]GEOIP,private,no-resolve
;本项目收录的直连规则
ruleset=🎯 全球直连,clash-domain:https://api.asailor.org/Custom_OpenClash_Rules/main/rule/Custom_Direct_Domain.yaml,28800
ruleset=🎯 全球直连,clash-classic:https://api.asailor.org/Custom_OpenClash_Rules/main/rule/Custom_Direct_Classical_IP.yaml,28800
;本项目收录的代理规则
ruleset=🚀 落地组,clash-domain:https://api.asailor.org/Custom_OpenClash_Rules/main/rule/Custom_Proxy_Domain.yaml,28800
ruleset=🚀 落地组,clash-classic:https://api.asailor.org/Custom_OpenClash_Rules/main/rule/Custom_Proxy_Classical_IP.yaml,28800
;谷歌在国内可用的域名直连
ruleset=🎯 全球直连,[]GEOSITE,google-cn
;国内游戏域名直连
ruleset=🎯 全球直连,[]GEOSITE,category-games@cn
;Steam 下载 CDN 直连
ruleset=🎯 全球直连,clash-classic:https://api.asailor.org/Custom_OpenClash_Rules/main/rule/Steam_CDN_Classical.yaml,28800
;各大游戏平台下载域名直连
ruleset=🎯 全球直连,[]GEOSITE,category-game-platforms-download
;BT Tracker 相关域名直连
ruleset=🎯 全球直连,[]GEOSITE,category-public-tracker
;即时通讯包括了 Telegram/WhatsApp/Line 等海外主流即时通讯软件域名
ruleset=💬 即时通讯,[]GEOSITE,category-communication
;社交媒体包括了 Twitter(X)/Facebook/Instagram 等海外主流社交媒体
ruleset=🌐 社交媒体,[]GEOSITE,category-social-media-!cn
ruleset=🤖 ChatGPT,[]GEOSITE,openai
ruleset=🤖 AI服务,[]GEOSITE,category-ai-!cn
ruleset=🚀 GitHub,[]GEOSITE,github
;测速工具包括 SpeedTest 等主流测速工具域名
ruleset=🚀 测速工具,[]GEOSITE,category-speedtest
ruleset=🎮 Steam,[]GEOSITE,steam
ruleset=📹 YouTube,[]GEOSITE,youtube
ruleset=🎥 AppleTV+,[]GEOSITE,apple-tvplus
ruleset=🍎 苹果服务,[]GEOSITE,apple
ruleset=Ⓜ️ 微软服务,[]GEOSITE,microsoft
ruleset=📢 谷歌FCM,[]GEOSITE,googlefcm
ruleset=🇬 谷歌服务,[]GEOSITE,google
ruleset=🎶 TikTok,[]GEOSITE,tiktok
ruleset=🎥 Netflix,[]GEOSITE,netflix
ruleset=🎥 DisneyPlus,[]GEOSITE,disney
ruleset=🎥 HBO,[]GEOSITE,hbo
ruleset=🎥 PrimeVideo,[]GEOSITE,primevideo
;Emby 包括主流 Emby 服务相关域名
ruleset=🎥 Emby,[]GEOSITE,category-emby
ruleset=🎻 Spotify,[]GEOSITE,spotify
ruleset=📺 Bahamut,[]GEOSITE,bahamut
ruleset=🎮 游戏平台,[]GEOSITE,category-games
ruleset=🌎 国外媒体,[]GEOSITE,category-entertainment
ruleset=🛒 国外电商,[]GEOSITE,category-ecommerce
ruleset=🚀 落地组,[]GEOSITE,gfw
ruleset=💬 即时通讯,[]GEOIP,telegram,no-resolve
ruleset=🌐 社交媒体,[]GEOIP,twitter,no-resolve
ruleset=🌐 社交媒体,[]GEOIP,facebook,no-resolve
ruleset=🇬 谷歌服务,[]GEOIP,google,no-resolve
ruleset=🎥 Netflix,[]GEOIP,netflix,no-resolve
;由于 OpenClash 使用的大陆白名单收录不全，此处留有 geosite:cn 作为国内域名兜底
ruleset=🎯 全球直连,[]GEOSITE,cn
;由于 OpenClash 使用的大陆白名单收录不全，此处留有 geoip:cn 作为国内 IP 兜底
ruleset=🎯 全球直连,[]GEOIP,cn,no-resolve
;以上兜底规则会根据实际情况随时取消
;PT/BT 优化开启会使 80/443 以外端口的流量直连
ruleset=🔀 非标端口,clash-classic:https://api.asailor.org/Custom_OpenClash_Rules/main/rule/Custom_Port_Direct.yaml,28800
;国内冷门域名会命中漏网之鱼，如影响使用，请设置漏网之鱼直连
;漏网之鱼直连时，无法通过 DNS 泄露测试，但是并不存在泄露
ruleset=🐟 漏网之鱼,[]FINAL
;设置规则标志位结束

;设置节点分组标志位
custom_proxy_group=🚀 前置组`select`[]DIRECT`[]♻️ 前置自动`!!PROVIDER=FRONT
custom_proxy_group=🚀 落地组`select`[]DIRECT`[]♻️ 落地自动`!!PROVIDER=EXIT
custom_proxy_group=♻️ 前置自动`url-test`!!PROVIDER=FRONT`https://cp.cloudflare.com/generate_204`300,,50
custom_proxy_group=♻️ 落地自动`url-test`!!PROVIDER=EXIT`https://cp.cloudflare.com/generate_204`300,,50
custom_proxy_group=💬 即时通讯`select`[]🚀 落地组`[]♻️ 落地自动`[]🎯 全球直连`.*
custom_proxy_group=🌐 社交媒体`select`[]🚀 落地组`[]♻️ 落地自动`[]🎯 全球直连`.*
custom_proxy_group=🚀 GitHub`select`[]🚀 落地组`[]♻️ 落地自动`[]🎯 全球直连`.*
custom_proxy_group=🤖 ChatGPT`select`[]🚀 落地组`[]♻️ 落地自动`🎯 全球直连`.*
custom_proxy_group=🤖 AI服务`select`[]🚀 落地组`[]♻️ 落地自动`🎯 全球直连`.*
custom_proxy_group=🎶 TikTok`select`[]🚀 落地组`[]♻️ 落地自动`🎯 全球直连`.*
custom_proxy_group=📹 YouTube`select`[]🚀 落地组`[]♻️ 落地自动`🎯 全球直连`.*
custom_proxy_group=🎥 Netflix`select`[]🚀 落地组`[]♻️ 落地自动`🎯 全球直连`.*
custom_proxy_group=🎥 DisneyPlus`select`[]🚀 落地组`[]♻️ 落地自动`🎯 全球直连`.*
custom_proxy_group=🎥 HBO`select`[]🚀 落地组`[]♻️ 落地自动`🎯 全球直连`.*
custom_proxy_group=🎥 PrimeVideo`select`[]🚀 落地组`[]♻️ 落地自动`🎯 全球直连`.*
custom_proxy_group=🎥 AppleTV+`select`[]🚀 落地组`[]♻️ 落地自动`[]🎯 全球直连`.*
custom_proxy_group=🎥 Emby`select`[]🚀 落地组`[]♻️ 落地自动`[]🎯 全球直连`.*
custom_proxy_group=🎻 Spotify`select`[]🚀 落地组`[]♻️ 落地自动`[]🎯 全球直连`.*
custom_proxy_group=📺 Bahamut`select`[]🚀 落地组`[]♻️ 落地自动`🎯 全球直连`.*
custom_proxy_group=🌎 国外媒体`select`[]🚀 落地组`[]♻️ 落地自动`🎯 全球直连`.*
custom_proxy_group=🛒 国外电商`select`[]🚀 落地组`[]♻️ 落地自动`[]🎯 全球直连`.*
custom_proxy_group=📢 谷歌FCM`select`[]🚀 落地组`[]♻️ 落地自动`🎯 全球直连`.*
custom_proxy_group=🇬 谷歌服务`select`[]🚀 落地组`[]♻️ 落地自动`🎯 全球直连`.*
custom_proxy_group=🍎 苹果服务`select`[]🎯 全球直连`[]🚀 落地组`[]♻️ 落地自动`.*
custom_proxy_group=Ⓜ️ 微软服务`select`[]🎯 全球直连`[]🚀 落地组`[]♻️ 落地自动`.*
custom_proxy_group=🎮 游戏平台`select`[]🎯 全球直连`[]🚀 落地组`[]♻️ 落地自动`.*
custom_proxy_group=🎮 Steam`select`[]🎯 全球直连`[]🚀 落地组`[]♻️ 落地自动`.*
custom_proxy_group=🚀 测速工具`select`[]🎯 全球直连`[]🚀 落地组`[]♻️ 落地自动`.*
custom_proxy_group=🐟 漏网之鱼`select`[]🚀 落地组`[]♻️ 落地自动`[]🎯 全球直连`.*
custom_proxy_group=🔀 非标端口`select`[]🐟 漏网之鱼`[]🎯 全球直连`.*
custom_proxy_group=🎯 全球直连`select`[]DIRECT
;设置分组标志位

;下方参数请勿修改
enable_rule_generator=true
overwrite_original_rules=true

